kernel.panic=3
kernel.panic_on_oops=1
vm.panic_on_oom=2
vm.oom_dump_tasks=1
net.ipv4.ip_forward=1
net.ipv4.route.max_size=4096
net.ipv4.conf.default.rp_filter=1
net.ipv4.conf.default.proxy_arp=0
net.ipv4.conf.default.force_igmp_version=2
net.ipv4.conf.all.rp_filter=1
net.ipv4.conf.all.proxy_arp=0
net.ipv4.conf.all.force_igmp_version=2
net.ipv4.ipfrag_high_thresh=65536
net.ipv4.ipfrag_low_thresh=32768
net.ipv4.ipfrag_time=2
net.ipv4.ip_local_port_range=32768	61000
net.ipv6.conf.default.forwarding=1
net.ipv6.conf.all.forwarding=1
net.ipv6.conf.default.autoconf=0
net.ipv6.conf.all.autoconf=0

# conntrack
net.nf_conntrack_max=65536
# ip_conntrack_tcp_timeout_established 1d -> 6h
net.netfilter.nf_conntrack_tcp_timeout_established=21600
# nf_conntrack_tcp_timeout_close 10s
# nf_conntrack_tcp_timeout_close_wait 60s -> 10
net.netfilter.nf_conntrack_tcp_timeout_close_wait=10
# nf_conntrack_tcp_timeout_fin_wait 120s -> 10
net.netfilter.nf_conntrack_tcp_timeout_fin_wait=10
# nf_conntrack_tcp_timeout_last_ack 30s -> 10
net.netfilter.nf_conntrack_tcp_timeout_last_ack=10
# nf_conntrack_tcp_timeout_syn_recv 60s -> 5
net.netfilter.nf_conntrack_tcp_timeout_syn_recv=5
# nf_conntrack_tcp_timeout_time_wait 120s -> 10s
net.netfilter.nf_conntrack_tcp_timeout_time_wait=10
# nf_conntrack_generic_timeout 10m
# nf_conntrack_icmp_timeout 30s -> 10s
net.netfilter.nf_conntrack_icmp_timeout=10
# nf_conntrack_udp_timeout_stream 3m
# nf_conntrack_udp_timeout 30s -> 10s
net.netfilter.nf_conntrack_udp_timeout=10
