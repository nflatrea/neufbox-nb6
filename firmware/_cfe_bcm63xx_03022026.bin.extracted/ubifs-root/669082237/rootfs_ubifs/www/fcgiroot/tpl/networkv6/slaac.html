<div class="title">
	<h1><?cs call:varHeader("dhcp_slaac") ?></h1>
</div>
<div class="content">
    <form method="post" action="<?cs var:Env.Page.Name ?>">
        <table>
            <tr>
                <th><?cs var:Env.Text.Activation ?></th>
                <td><?cs call:div_onoff("dhcp6_slaac", Env.user.ipv6.slaac == "on") ?></td>
            </tr>
        </table>
        <button class="btn" type="submit" name="submit"><?cs var:Button.Submit ?></button>
    </form>
    <div class="alert alert-warning" id="slaac_off_warning" <?cs if:Env.user.ipv6.slaac != "off" ?>style="display:none;"<?cs /if?>>
        <?cs var:Env.Text.slaac_off_warning?>
    </div>
</div>
