        <?cs set:status = "enabled" ?>
        <?cs else ?>
        <?cs set:status = "unused" ?>
        <?cs /if ?>
        <td class="<?cs var:status ?>">
            <?cs if:status == "enabled" ?><?cs var:Env.Var.ont_details_failure.up ?><?cs /if ?>
            <?cs if:status == "disabled" ?><?cs var:Env.Var.ont_details_failure.down ?><?cs /if ?>
            <?cs if:status == "unused" ?><?cs var:Env.Text.Undefined ?><?cs /if ?>
        </td>
    </tr>
</table>
