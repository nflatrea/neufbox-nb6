<?cs set:isep1 = string.find(Env.Page.Name, '_')?>
<?cs if:isep1 != -1?>
    <?cs set:len = string.length(Env.Page.Name)?>
    <?cs set:iv1 = string.slice(Env.Page.Name, 0, isep1) ?>

    <?cs set:iv2 = string.slice(Env.Page.Name, isep1 + 1, len) ?>
    <?cs set:isep2 = string.find(iv2, '_')?>
    <?cs if:isep2 != -1?>
        <?cs set:iv2 = string.slice(iv2, 0, isep2) ?>
    <?cs /if?>
<?cs else?>
    <?cs set:iv1 = Env.Page.Name?>
    <?cs set:iv2 = ""?>
<?cs /if?>

    <div class="navbar">
        <div class="navbar-inner">
            <div class="container">

                <a class="btn btn-navbar" data-toggle="collapse" data-target=".nav-collapse">
                    <i class="icon-list-alt  icon-white"></i>&nbsp;Menu
                </a>

                <div class="nav-collapse collapse">
                    <ul class="nav">
                        <?cs each:item = Env.Menu ?>
                            <?cs set:tabMenuDisplay="on" ?>
                            <?cs if:?Env.MenuHidden[name(item)] && Env.MenuHidden[name(item)] == "on"?>                
                                    <?cs set:tabMenuDisplay="off" ?>
                            <?cs /if ?>
                            <?cs if:tabMenuDisplay == "on" ?>
                            
                                <?cs if:Env.Page.Name.Parent == name(item) ?>
                                    <?cs set:breadcrumb.0=name(item) ?>
                                <?cs /if ?>
                            
                                <li id="id_<?cs var:name(item) ?>_tab" class="dropdown">
                                    <a class="dropdown-toggle" id="btn-<?cs var:name(item) ?>" data-toggle="dropdown" href="#" title="<?cs var:item.Label ?>">
                                        <?cs var:item.Label ?>
                                        <b class="caret caret-right"></b>
                                    </a>
                                    <ul class="dropdown-menu">
                                        <li class="tab_<?cs if:!?Env.Page.Name.Child || Env.Page.Name.Child == ""?>on<?cs else?>off<?cs /if?>">
                                            <a href="/<?cs var:name(item) ?>" title="<?cs var:Env.Text.General?>"><?cs var:Env.Text.General?></a>
                                        </li>
                                        <?cs each:subitem = Env.Menu[name(item)].SubMenu ?>
                                        
                                                <?cs set:tabSubMenuDisplay="on" ?>
                                                <?cs if:?Env.MenuHidden[name(item)][name(subitem)] && Env.MenuHidden[name(item)][name(subitem)] == "on"?>
                                                        <?cs set:tabSubMenuDisplay="off" ?>
                                                <?cs /if ?>

                                                <?cs if:tabSubMenuDisplay == "on" ?>
                                                
                                                <?cs if:Env.Page.Name.Child == name(subitem) ?>
                                                    <?cs set:breadcrumb.1=name(subitem) ?>
                                                <?cs /if ?>
                                        
                                                <li class="tab_<?cs if:Env.Page.Name.Child == name(subitem) ?>on<?cs else ?>off<?cs /if ?>">
                                                    <a href="/<?cs var:name(item) ?>/<?cs var:name(subitem) ?>" title="<?cs var:subitem.Label ?>"><?cs var:subitem.Label ?></a>
                                                </li>
                                                <?cs /if ?>
                                            <?cs /each ?>
                                    </ul>
                                </li>
                            <?cs /if ?>
                        <?cs /each ?>
                    </ul>
                    
                    <ul class="nav pull-right">
                        <?cs if:User.authenticated=="1"?>
                        <li id="logout_tab" class="tab_signoff"><a href="/logout"><?cs var:Button.Signoff?></a></li>
                        <?cs /if?>
                    </ul>
                    
                </div>
            </div>
        </div>
    </div>


    <ul class="breadcrumb">
        <li><i class="icon-home"></i>&nbsp;<a href="/">Home</a> <?cs if:?breadcrumb.0 ?><span class="divider">&gt;</span><?cs /if ?></li>
        <?cs if:?breadcrumb.0 ?>
        <li><a href="/<?cs var:breadcrumb.0 ?>"><?cs var:Env.Menu[breadcrumb.0].Label ?></a> <?cs if:?Env.Menu[breadcrumb.0].SubMenu[breadcrumb.1].Label ?><span class="divider">&gt;</span><?cs /if ?></li>
        <?cs /if?>
        <?cs if:?Env.Menu[breadcrumb.0].SubMenu[breadcrumb.1].Label ?>
        <li><a href="/<?cs var:breadcrumb.0 ?>/<?cs var:breadcrumb.1 ?>"><?cs var:Env.Menu[breadcrumb.0].SubMenu[breadcrumb.1].Label ?></a></li>
        <?cs /if?>
    </ul>
